name: CI - Lint & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings (line length set to 127)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('punkt'); nltk.download('punkt_tab')"
          python -m textblob.download_corpora lite

      - name: Test mood analysis
        run: |
          python -c "
          from moodplaylist import analyze_mood, classify_mood
          polarity, subjectivity = analyze_mood('Today was amazing! I got a promotion!')
          mood = classify_mood('Today was amazing! I got a promotion!', polarity, subjectivity)
          assert mood == 'happy', f'Expected happy, got {mood}'
          polarity, subjectivity = analyze_mood('I feel so sad and lonely, I miss everyone.')
          mood = classify_mood('I feel so sad and lonely, I miss everyone.', polarity, subjectivity)
          assert mood == 'sad', f'Expected sad, got {mood}'
          polarity, subjectivity = analyze_mood('So much stress and pressure at work, deadline tomorrow.')
          mood = classify_mood('So much stress and pressure at work, deadline tomorrow.', polarity, subjectivity)
          assert mood == 'stressed', f'Expected stressed, got {mood}'
          print('All mood analysis tests passed!')
          "

      - name: Verify Streamlit app can load
        run: |
          python -c "import streamlit; print(f'Streamlit version: {streamlit.__version__}')"
          python -c "import app; print('App module loaded successfully')"
